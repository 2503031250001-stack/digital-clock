<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>
Digital Clock</title>
<style>
*{margin:0;
padding:0;
box-sizing:border-box}
body{font-family: 'Courier New', monospace;
background: #1a1a2e;
min-height:100vh;
display: flex;
flex-direction:column;
align-items:center;
justify-content:center}
h1{color:#b7bec6;
margin-bottom:20px;
font-size:2rem}
.clock{background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
border: 3px solid #f30606;
border-radius: 30px;
padding: 50px 100px;
box-shadow:0 20px 60px rgba(233,69,96,0.3)}
.time{font-size:6rem;
color:#00d4ff;
font-weight:bold;
letter-spacing:5px;
text-shadow: 0 0 20px #00d4ff}
.date{font-size:1.2rem;
color: #d611a4;
margin-top: 20px;
text-align:center}
</style>
</head>
<body>
<h1>
Digital Clock</h1>
<div class="clock">
<div class="time" id="time">
00:00:00</div>
<div class="date" id="date">
</div>
</div>
<script>
  const update=()=>
  {const now=new Date();
  const time=now.toLocaleTimeString();
  const date=now.toLocaleDateString('en-US', {weekday: 'long', year: 'numeric',month: 'long', day: 'numeric'}
  );
  document.getElementById('time').textContent=time;
  document.getElementById('date').textContent=date;
  }
  ;
  update();
  setInterval(update, 1000);
  </script>
  </body>
  </html>
